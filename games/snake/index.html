<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snake Deluxe</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

    background:
    radial-gradient(circle at top,#1d2b64,#0f172a);

    color:white;

    overflow:hidden;
}

body::before{

    content:"";

    position:fixed;

    width:200%;
    height:200%;

    left:-50%;
    top:-50%;

    background:
    radial-gradient(
    rgba(255,255,255,.08) 2px,
    transparent 2px);

    background-size:60px 60px;

    animation:stars 60s linear infinite;
}

@keyframes stars{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(300px);
    }

}

.panel{

    background:
    rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:35px;

    text-align:center;

    width:520px;

    max-width:95%;

    box-shadow:
    0 20px 60px rgba(0,0,0,.4);

    animation:appear .5s ease;
}

@keyframes appear{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

h1{

    font-size:3rem;

    margin-bottom:10px;
}

p{

    opacity:.8;

    margin-bottom:20px;
}

button{

    border:none;

    border-radius:15px;

    padding:15px 25px;

    margin:8px;

    cursor:pointer;

    font-size:18px;

    transition:.3s;
}

button:hover{

    transform:
    translateY(-3px)
    scale(1.05);
}

.play{

    background:#22c55e;
    color:white;
}

.settings{

    background:#3b82f6;
    color:white;
}

canvas{

    background:black;

    border-radius:20px;

    border:4px solid white;

    box-shadow:
    0 0 40px rgba(255,255,255,.2);
}

#game{

    display:none;
}

a{

    color:white;
}

#gameover,
#settingsMenu{

    display:none;
}

.score{

    margin:15px;

    font-size:22px;

    font-weight:bold;
}

</style>
</head>
<body>

<div class="panel" id="menu">

    <h1>🐍 Snake Deluxe</h1>

    <p>
    Come manzanas y consigue la máxima puntuación.
    </p>

    <button
    class="play"
    onclick="startGame()">
    ▶ PLAY
    </button>

    <button
    class="settings"
    onclick="openSettings()">
    ⚙ SETTINGS
    </button>

    <br><br>

    <a href="../../index.html">
    ⬅ Volver al portal
    </a>

</div>

<div class="panel" id="settingsMenu">

    <h1>⚙ Settings</h1>

    <p>

    Retro Mode

    <input
    type="checkbox"
    id="retroToggle"
    checked>

    </p>

    <button
    class="play"
    onclick="backMenu()">
    Back
    </button>

</div>

<div class="panel" id="gameover">

    <h1>💀 GAME OVER</h1>

    <div
    class="score"
    id="scoreText">
    </div>

    <button
    class="play"
    onclick="startGame()">
    Play Again
    </button>

    <button
    class="settings"
    onclick="backMenu()">
    Menu
    </button>

</div>

<canvas
id="game"
width="500"
height="500">
</canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const appleImage = new Image();
appleImage.src = "apple.png";

const box = 25;

let snake;
let food;

let dx;
let dy;

let score=0;

let gameLoop;

let retroMode=true;

function startGame(){

    clearInterval(gameLoop);

    retroMode =
    document.getElementById(
    "retroToggle").checked;

    snake=[
        {x:250,y:250}
    ];

    food=randomFood();

    dx=box;
    dy=0;

    score=0;

    hideAll();

    canvas.style.display="block";

    gameLoop =
    setInterval(draw,90);
}

function randomFood(){

    return{

        x:
        Math.floor(
        Math.random()*20
        )*box,

        y:
        Math.floor(
        Math.random()*20
        )*box

    };

}

function hideAll(){

    document.getElementById(
    "menu").style.display="none";

    document.getElementById(
    "settingsMenu").style.display="none";

    document.getElementById(
    "gameover").style.display="none";

}

function openSettings(){

    hideAll();

    document.getElementById(
    "settingsMenu").style.display=
    "block";
}

function backMenu(){

    clearInterval(gameLoop);

    canvas.style.display="none";

    hideAll();

    document.getElementById(
    "menu").style.display=
    "block";
}

document.addEventListener(
"keydown",
e=>{

if(e.key==="ArrowUp" && dy===0){
dx=0;
dy=-box;
}

if(e.key==="ArrowDown" && dy===0){
dx=0;
dy=box;
}

if(e.key==="ArrowLeft" && dx===0){
dx=-box;
dy=0;
}

if(e.key==="ArrowRight" && dx===0){
dx=box;
dy=0;
}

});

function gameOver(){

clearInterval(gameLoop);

canvas.style.display="none";

document.getElementById(
"scoreText").innerText=
"Score: "+score;

document.getElementById(
"gameover").style.display=
"block";

}

function draw(){

ctx.clearRect(
0,
0,
500,
500);

// --- DIBUJAR LA COMIDA ---
// Forzamos a que dibuje siempre la imagen apple.png
ctx.drawImage(appleImage, food.x, food.y, box, box);

snake.forEach(part=>{

if(retroMode){

ctx.fillStyle="lime";

ctx.fillRect(
part.x,
part.y,
box,
box);

}else{

let g=
ctx.createRadialGradient(
part.x+12,
part.y+12,
2,
part.x+12,
part.y+12,
15);

g.addColorStop(
0,
"#7CFC00");

g.addColorStop(
1,
"#145214");

ctx.fillStyle=g;

ctx.beginPath();

ctx.arc(
part.x+12,
part.y+12,
12,
0,
Math.PI*2);

ctx.fill();

}

});

let head={

x:snake[0].x+dx,
y:snake[0].y+dy

};

if(
head.x<0||
head.y<0||
head.x>=500||
head.y>=500
){
gameOver();
return;
}

for(
let i=0;
i<snake.length;
i++
){

if(
head.x===snake[i].x &&
head.y===snake[i].y
){
gameOver();
return;
}

}

if(
head.x===food.x &&
head.y===food.y
){

score++;

food=randomFood();

}else{

snake.pop();

}

snake.unshift(head);

ctx.fillStyle="white";

ctx.font="20px Arial";

ctx.fillText(
"Score: "+score,
10,
30);

}

</script>

</body>
</html>
